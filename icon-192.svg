<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="fire" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="32" fill="url(#bg)"/>
  <!-- Brain outline -->
  <g transform="translate(96,100)">
    <ellipse cx="0" cy="0" rx="45" ry="50" fill="none" stroke="url(#fire)" stroke-width="3"/>
    <!-- Brain folds -->
    <path d="M -30 -20 Q -20 -25 -10 -20 T 10 -20" fill="none" stroke="url(#fire)" stroke-width="2"/>
    <path d="M -30 0 Q -20 -5 -10 0 T 10 0" fill="none" stroke="url(#fire)" stroke-width="2"/>
    <path d="M -30 20 Q -20 15 -10 20 T 10 20" fill="none" stroke="url(#fire)" stroke-width="2"/>
  </g>
  <!-- Flames on top -->
  <g transform="translate(96,40)">
    <path d="M -10 10 Q -13 0 -10 -10 Q -7 0 -10 10 Z" fill="#ef4444" opacity="0.8"/>
    <path d="M 0 5 Q -3 -5 0 -15 Q 3 -5 0 5 Z" fill="#f97316" opacity="0.9"/>
    <path d="M 10 10 Q 7 0 10 -10 Q 13 0 10 10 Z" fill="#ef4444" opacity="0.8"/>
  </g>
  <!-- Text -->
  <text x="96" y="172" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#ef4444" letter-spacing="2">BURNOUT</text>
</svg>
