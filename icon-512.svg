<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="fire" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <style>
      @keyframes flicker { 0%,100% { opacity: 0.7; } 50% { opacity: 1; } }
      .flame { animation: flicker 1.5s ease-in-out infinite; }
      .flame-d1 { animation-delay: 0s; }
      .flame-d2 { animation-delay: 0.3s; }
      .flame-d3 { animation-delay: 0.6s; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Glow behind brain -->
  <ellipse cx="256" cy="260" rx="140" ry="140" fill="url(#glow)"/>
  <!-- Brain outline -->
  <g transform="translate(256,260)">
    <ellipse cx="0" cy="0" rx="110" ry="120" fill="none" stroke="url(#fire)" stroke-width="6"/>
    <!-- Brain folds -->
    <path d="M -70 -50 Q -50 -60 -30 -50 T 10 -50 T 50 -50" fill="none" stroke="url(#fire)" stroke-width="4" opacity="0.8"/>
    <path d="M -70 0 Q -50 -10 -30 0 T 10 0 T 50 0" fill="none" stroke="url(#fire)" stroke-width="4" opacity="0.8"/>
    <path d="M -70 50 Q -50 40 -30 50 T 10 50 T 50 50" fill="none" stroke="url(#fire)" stroke-width="4" opacity="0.8"/>
    <!-- Additional detail folds -->
    <path d="M -80 -20 Q -60 -10 -40 -20" fill="none" stroke="url(#fire)" stroke-width="3" opacity="0.4"/>
    <path d="M 40 -20 Q 60 -10 80 -20" fill="none" stroke="url(#fire)" stroke-width="3" opacity="0.4"/>
    <path d="M -80 30 Q -60 40 -40 30" fill="none" stroke="url(#fire)" stroke-width="3" opacity="0.4"/>
    <path d="M 40 30 Q 60 40 80 30" fill="none" stroke="url(#fire)" stroke-width="3" opacity="0.4"/>
  </g>
  <!-- Flames on top -->
  <g transform="translate(256,100)">
    <path class="flame flame-d1" d="M -26 24 Q -32 8 -26 -8 Q -20 8 -26 24 Z" fill="#ef4444"/>
    <path class="flame flame-d2" d="M 0 14 Q -8 -4 0 -28 Q 8 -4 0 14 Z" fill="#f97316"/>
    <path class="flame flame-d3" d="M 26 24 Q 20 8 26 -8 Q 32 8 26 24 Z" fill="#ef4444"/>
    <!-- Small flame sparks -->
    <circle cx="-40" cy="0" r="4" fill="#f97316" opacity="0.6"/>
    <circle cx="40" cy="0" r="4" fill="#f97316" opacity="0.6"/>
    <circle cx="-12" cy="-20" r="3" fill="#ef4444" opacity="0.5"/>
    <circle cx="12" cy="-20" r="3" fill="#ef4444" opacity="0.5"/>
  </g>
  <!-- Text -->
  <text x="256" y="430" text-anchor="middle" font-family="system-ui,sans-serif" font-size="36" font-weight="700" fill="#ef4444" letter-spacing="6">BURNOUT</text>
  <text x="256" y="465" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="400" fill="#ef4444" opacity="0.6" letter-spacing="2">TYPE TEST</text>
</svg>
